<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>An Emotionally Unstable Playlist</title>
  <link rel="stylesheet" href="style.css" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>

<body>

<div class="player">

  <div class="header">An Emotionally Unstable Playlist</div>

  <div class="art">
    <img id="trackImage" src="img/default.jpg" alt="" />
  </div>
<div class="track-info">

  <div id="trackTitle" class="track-title">
    -
  </div>

  <div id="trackArtist" class="track-artist">
    -
  </div>

  <div id="trackYear" class="track-year">
    -
  </div>
  <div class="progress">
    <input type="range" id="seek" value="0" />
    <div class="time">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button id="prev">⏮</button>
    <button id="play">▶</button>
    <button id="next">⏭</button>
  </div>
<button id="showNote">
  Read Note
</button>

<div id="trackNote" class="track-note hidden">

</div>

<button id="showLyrics">
  Read Lyrics
</button>

<div id="trackLyrics" class="hidden lyrics-panel">

</div>
  <div class="playlist" id="playlist"></div>

</div>
<div class="footer">
  <div class="footer-text">
    This playlist was made for one and only Yavar
    <br>
    Happy 45th birthday!
  </div>
  <div class="footer-meta">
    coded by Hasti
  </div>
</div>

<div id="warningModal" class="modal">
  <div class="modal-content">
    
    <p>⚠️WARNING⚠️<br>
      This Playlist Is Emotionally Unstable!
      <br>
      Proceed With Care!</p>
    <button id="closeModal" class="modal-button">Play Anyway</button>
    
  </div>
</div>
<script src="tracks.js"></script>
<script src="app.js"></script>

</body>
</html>
